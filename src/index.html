<!DOCTYPE html>
<html lang="pt-Br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Garagem</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/index.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="container">
        <h1>Minha Garagem</h1>
        <div>
            <h3>Adicionar Veículo</h3>
            <input id="marca" type="text" placeholder="Marca">
            <input id="modelo" type="text" placeholder="Modelo">
            <select id="tipo">
                <option value="carro">Carro</option>
                <option value="moto">Moto</option>
            </select>
            <div id="pPortas">
                <input id="portas" type="number" placeholder="Numero de portas">
            </div>
            <div id="pCilindradas">
                <input id="cilindradas" type="number" placeholder="Cilindradas">
            </div>
            <button id="cadastrar">Cadastrar veículo</button>
        </div>
        <div>
            <button id="listar">Listar veículo</button>
            <div id="fundoLista">
                <h5 id="tituloLista">Lista de veiculos</h5>
                <div id="lista"></div>
            </div>
        </div>
        <div>
            <button id="mover">Mover veículo</button>
            <div id="fundoLista">
                <h5 id="tituloMover">Veiculos na Pista</h5>
                <div id="listaMover"></div>
            </div>
        </div>
    </div>
</body>

</html>
